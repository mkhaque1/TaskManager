<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-slate-300">
    <div class="max-w-3xl mx-auto mt-10 bg-white p-6 rounded-xl shadow">
      <!-- title -->
      <h1 class="text-3xl font-bold text-center mb-6">Task Manager</h1>
      <!-- task input and button -->
      <div class="flex gap-3 mb-4">
        <input
          id="taskInput"
          class="flex-1 border border-purple-300 p-3 rounded-xl placeholder-purple-300"
          type="text"
          placeholder="add new task.."
        />
        <button id="addBtn" class="bg-purple-600 text-white px-6 rounded-lg">
          Add Task
        </button>
      </div>

      <!-- search box -->

      <input
        id="searchInput"
        class="w-full border border-purple-300 p-3 rounded-xl"
        type="text"
        placeholder="Search item..."
      />

      <!-- task count -->

      <div class="flex gap-1 my-4 text-sm">
        <p>Total Task:</p>
        <span id="count">0</span>
      </div>

      <!-- task list -->

      <div id="taskList"></div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
